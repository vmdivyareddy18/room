<!DOCTYPE html>
<html>

<head>
    <title>RoomBook - Rooms</title>
    <link rel="stylesheet" href="room.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>RoomBook</h2>
            <ul>
                <li><a href="index1.html">Dashboard</a></li>
                <li class="active"><a href="rooms.html">Rooms</a></li>
                <li><a href="book.html">Bookings</a></li>
                <li><a href="add.html">New Booking</a></li>
            </ul>
        </div>

        <!-- Main -->
        <div class="main">
            <h1>Available Rooms</h1>

            <div class="room-grid">

                <!-- Room 1 -->
                <div class="room-card">
                    <span class="status available">Available</span>
                    <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2108b" alt="Room">
                    <div class="room-info">
                        <h3>Executive Suite</h3>
                        <p>Luxurious suite with city view.</p>
                        <div class="price">₹299 / night</div>
                        <button onclick="openModal('Executive Suite')">Book Now</button>
                    </div>
                </div>

                <!-- Room 2 -->
                <div class="room-card">
                    <span class="status available">Available</span>
                    <img src="https://images.unsplash.com/photo-1553444836-bc6c8d340ba7" alt="Room">
                    <div class="room-info">
                        <h3>Conference Hall A</h3>
                        <p>Spacious hall with projector.</p>
                        <div class="price">₹450 / night</div>
                        <button onclick="openModal('Conference Hall A')">Book Now</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="roomTitle">Book Room</h2>

            <form id="bookingForm">
                <label>Name:</label>
                <input type="text" required>

                <label>Email:</label>
                <input type="email" required>

                <label>Check-in Date:</label>
                <input type="date" required>

                <label>Check-out Date:</label>
                <input type="date" required>

                <button type="submit" class="confirm-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="rooms.js"></script>

</body>

</html>
