<!DOCTYPE html>
<html>

<head>
    <title>RoomBook - New Booking</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f6fa;
        }

        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background: #1f2a44;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar a:hover,
        a {
            color: #dddddd;
            text-decoration: none;
            /* light white on hover */
        }

        .sidebar li {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .sidebar li:hover,
        .sidebar .active {
            background: #f4a300;
        }


        /* Main */
        .main {
            flex: 1;
            padding: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: gray;
            margin-bottom: 30px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
            max-width: 700px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .col {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #f4a300;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d88e00;
        }

        .success {
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }

        /* Modal Background */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* Modal Box */
        .modal-content {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: slideDown 0.3s ease;
        }

        .modal-content input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .confirm-btn {
            width: 100%;
            padding: 10px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .confirm-btn:hover {
            background: #0f172a;
        }

        /* Close Button */
        .close {
            float: right;
            font-size: 22px;
            cursor: pointer;
        }

        /* Animation */
        @keyframes slideDown {
            from {
                transform: translate(-50%, -60%);
                opacity: 0;
            }

            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>RoomBook</h2>
            <ul>
                <li><a href="index1.html">Dashboard</a></li>
                <li><a href="rooms.html">Rooms</a></li>
                <li class="active"><a href="book.html">Bookings</a></li>
                <li><a href="add.html">New Booking</a></li>
            </ul>
        </div>
        <!-- Main -->
        <div class="main">

            <h1>New Booking</h1>
            <div class="subtitle">Create a new room reservation</div>

            <div class="form-container">
                <form id="bookingForm">

                    <label>Select Room</label>
                    <select id="room" required>
                        <option value="">Choose a room...</option>
                        <option>Executive Suite</option>
                        <option>Conference Hall A</option>
                        <option>Standard Twin Room</option>
                        <option>Deluxe King Room</option>
                    </select>

                    <div class="row">
                        <div class="col">
                            <label>Guest Name</label>
                            <input type="text" id="name" placeholder="Full name" required>
                        </div>

                        <div class="col">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="email@example.com" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col">
                            <label>Check-in</label>
                            <input type="date" id="checkin" required>
                        </div>

                        <div class="col">
                            <label>Check-out</label>
                            <input type="date" id="checkout" required>
                        </div>
                    </div>

                    <button type="submit">Confirm Booking</button>

                </form>

                <div id="successMsg" class="success"></div>
            </div>

        </div>
    </div>
    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Book Room</h2>

            <form id="bookingForm">
                <label>Name:</label>
                <input type="text" required>

                <label>Email:</label>
                <input type="email" required>

                <label>Check-in Date:</label>
                <input type="date" required>

                <label>Check-out Date:</label>
                <input type="date" required>

                <button type="submit" class="confirm-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>

        document.getElementById("bookingForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let room = document.getElementById("room").value;
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let checkin = document.getElementById("checkin").value;
            let checkout = document.getElementById("checkout").value;

            if (checkin >= checkout) {
                alert("Check-out date must be after check-in date!");
                return;
            }

            document.getElementById("successMsg").innerText =
                "Booking Confirmed for " + name + " in " + room;

            document.getElementById("bookingForm").reset();
        });


    </script>
    <script>
        function openModal() {
            document.getElementById("bookingModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("bookingModal").style.display = "none";
        }

        // Close when clicking outside
        window.onclick = function (event) {
            let modal = document.getElementById("bookingModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Form Submit
        document.getElementById("bookingForm").addEventListener("submit", function (e) {
            e.preventDefault();
            alert("Room Booked Successfully!");
            closeModal();
        });
    </script>

</body>

</html>
